<!DOCTYPE html>
<html>
<head>
<title>Responsive DOM Infix Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.calculator{
width:100%;
max-width:400px;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
}
</style>

<script>

window.onload=function(){

var container=document.createElement("div");
container.className="calculator text-center";

var title=document.createElement("h3");
title.innerHTML="Infix Calculator";

var input=document.createElement("input");
input.type="text";
input.id="exp";
input.className="form-control mb-3";
input.placeholder="Example: 5+3*2";

var button=document.createElement("button");
button.innerHTML="Calculate";
button.className="btn btn-primary w-100 mb-3";
button.onclick=calculate;

var result=document.createElement("input");
result.type="text";
result.id="result";
result.className="form-control";
result.placeholder="Result";

container.appendChild(title);
container.appendChild(input);
container.appendChild(button);
container.appendChild(result);

document.body.appendChild(container);

runTests();   // Run test suite
}

function calculate(){
var exp=document.getElementById("exp").value;
try{
var res=eval(exp);
document.getElementById("result").value=res;
}
catch{
document.getElementById("result").value="Invalid Expression";
}
}

/* -------- Test Suite -------- */

function test(expression, expected){
var result=eval(expression);

if(result==expected)
console.log("PASS:",expression,"=",result);
else
console.log("FAIL:",expression,"Expected:",expected,"Got:",result);
}

function runTests(){
console.log("Running Test Suite...");

test("5+3",8);
test("10-4",6);
test("6*2",12);
test("8/2",4);
test("9%4",1);
test("5+3*2",11);

console.log("Tests Completed");
}

</script>

</head>

<body>
</body>
</html>
