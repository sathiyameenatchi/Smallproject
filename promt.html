<!DOCTYPE html>
<html>
<head>
<title>Prompt Example</title>

<script>
function getValue() {
    var name = prompt("Enter your name:");
    document.getElementById("result").innerHTML = name;
}
</script>

</head>

<body onload="getValue()">

<h2>Your name is: <span id="result"></span></h2>

</body>
</html>
