<!DOCTYPE html>
<html>
<head>
    <title>DOM Calculator</title>

    <h1>DOM Calculator</h1>

    <a href="arithmatic.html">Basic DOM Calculator</a><br>
    <a href="calc.html">DOM Calculator (CSS Only)</a><br>
    <a href="calculator.html">Responsive DOM Infix Calculator</a><br>
    <a href="dynamic.html">Test Infix Calculator</a><br>
    <a href="infix.html">About</a><br>
    <a href="resposive.html">Contact</a><br>
    <a href="test.html">Feedback</a><br>
    <style>
        body{
            font-family: Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f2f2f2;
        }

        .calculator{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        #display{
            width:100%;
            height:40px;
            font-size:20px;
            margin-bottom:10px;
            text-align:right;
            padding:5px;
        }

        button{
            width:60px;
            height:40px;
            margin:5px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div>
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('/')">/</button>
    </div>

    <div>
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('*')">*</button>
    </div>

    <div>
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('-')">-</button>
    </div>

    <div>
        <button onclick="appendValue('0')">0</button>
        <button onclick="clearDisplay()">C</button>
        <button onclick="calculate()">=</button>
        <button onclick="appendValue('+')">+</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        }catch{
            display.value = "Error";
        }
    }
</script>

</body>
</html>
