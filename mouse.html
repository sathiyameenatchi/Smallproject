<!DOCTYPE html>
<html>
<head>
<title>Mouse Coordinates</title>

<script>
function showCoordinates(event){
    var x = event.clientX;
    var y = event.clientY;

    document.getElementById("result").innerHTML =
    "X coordinate: " + x + " , Y coordinate: " + y;
}
</script>

</head>

<body>

<h1 onclick="showCoordinates(event)">
Click on this heading
<p>This is a paragraph inside the h1 tag.</p>
</h1>

<br>

Mouse Position: <span id="result"></span>

</body>
</html>
