<!DOCTYPE html>
<html>
<head>
<title>Responsive DOM Infix Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.calculator{
width:100%;
max-width:400px;
padding:25px;
background:white;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}

h3{
margin-bottom:20px;
}

@media (max-width:576px){
.calculator{
padding:15px;
}
}

</style>

<script>

window.onload=function(){

var container=document.createElement("div");
container.className="calculator text-center";

var title=document.createElement("h3");
title.innerHTML="Infix Expression Calculator";

var input=document.createElement("input");
input.type="text";
input.id="exp";
input.className="form-control mb-3";
input.placeholder="Example: 5+3*2";

var button=document.createElement("button");
button.innerHTML="Calculate";
button.className="btn btn-primary w-100 mb-3";
button.onclick=calculate;

var result=document.createElement("input");
result.type="text";
result.id="result";
result.className="form-control";
result.placeholder="Result";

container.appendChild(title);
container.appendChild(input);
container.appendChild(button);
container.appendChild(result);

document.body.appendChild(container);

}

function calculate(){

var exp=document.getElementById("exp").value;

try{
var res=eval(exp);
document.getElementById("result").value=res;
}
catch{
document.getElementById("result").value="Invalid Expression";
}

}

</script>

</head>

<body>

</body>
</html>
