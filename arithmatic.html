<!DOCTYPE html>
<html>
<head>
<title>Arithmetic Operations</title>

<script>

function add()
{
var a = parseFloat(document.getElementById("num1").value);
var b = parseFloat(document.getElementById("num2").value);
document.getElementById("result").value = a + b;
}

function sub()
{
var a = parseFloat(document.getElementById("num1").value);
var b = parseFloat(document.getElementById("num2").value);
document.getElementById("result").value = a - b;
}

function mul()
{
var a = parseFloat(document.getElementById("num1").value);
var b = parseFloat(document.getElementById("num2").value);
document.getElementById("result").value = a * b;
}

function div()
{
var a = parseFloat(document.getElementById("num1").value);
var b = parseFloat(document.getElementById("num2").value);
document.getElementById("result").value = a / b;
}

function mod()
{
var a = parseFloat(document.getElementById("num1").value);
var b = parseFloat(document.getElementById("num2").value);
document.getElementById("result").value = a % b;
}

</script>
</head>

<body>

<h3>Arithmetic Operations using JavaScript</h3>

Enter First Number:
<input type="text" id="num1"><br><br>

Enter Second Number:
<input type="text" id="num2"><br><br>

<input type="button" value="Add" onclick="add()">
<input type="button" value="Subtract" onclick="sub()">
<input type="button" value="Multiply" onclick="mul()">
<input type="button" value="Divide" onclick="div()">
<input type="button" value="Modulus" onclick="mod()">

<br><br>

Result:
<input type="text" id="result">

</body>
</html>
