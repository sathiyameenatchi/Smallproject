<!DOCTYPE html>
<html>
<head>
<title>Editable Content on Hover</title>

<script>
function enableEdit(event) {
    event.target.contentEditable = true;
    event.target.style.backgroundColor = "#e0f7fa"; // highlight editable
}

function disableEdit(event) {
    event.target.contentEditable = false;
    event.target.style.backgroundColor = ""; // remove highlight
}
</script>

<style>
p, div, span {
    padding: 5px;
    border: 1px solid #ccc;
    display: inline-block;
}
</style>

</head>

<body>

<h2>Editable Content on Hover Example</h2>

<p onmouseover="enableEdit(event)" onmouseout="disableEdit(event)">
Hover over this paragraph to edit it.
</p>

<br><br>

<div onmouseover="enableEdit(event)" onmouseout="disableEdit(event)">
Hover over this div to edit it.
</div>

<br><br>

<span onmouseover="enableEdit(event)" onmouseout="disableEdit(event)">
Hover over this span to edit it.
</span>

</body>
</html>
