<!DOCTYPE html>
<html>
<head>
<title>DOM Infix Calculator</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body{
background-color:#f2f2f2;
}

.calculator{
width:350px;
margin:100px auto;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

#result{
margin-top:10px;
}
</style>

<script>

window.onload=function(){

var container=document.createElement("div");
container.className="calculator text-center";

var title=document.createElement("h3");
title.innerHTML="Infix Expression Calculator";

var input=document.createElement("input");
input.type="text";
input.id="exp";
input.className="form-control";
input.placeholder="Enter expression (eg: 5+3*2)";

var btn=document.createElement("button");
btn.innerHTML="Calculate";
btn.className="btn btn-primary mt-3";
btn.onclick=calculate;

var result=document.createElement("input");
result.type="text";
result.id="result";
result.className="form-control";
result.placeholder="Result";

container.appendChild(title);
container.appendChild(input);
container.appendChild(btn);
container.appendChild(result);

document.body.appendChild(container);

}

function calculate()
{
var exp=document.getElementById("exp").value;
var res=eval(exp);
document.getElementById("result").value=res;
}

</script>

</head>
<body>

</body>
</html>
