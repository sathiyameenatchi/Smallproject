<!DOCTYPE html>
<html>
<head>
<title>DOM Pagination Dynamic</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
body {
    background: #f8f9fa;
    padding: 30px;
}
.container-box {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
.page-btn {
    margin: 2px;
}
</style>

<script>
// Sample data
let data = [];
for(let i=1;i<=50;i++){
    data.push("Item "+i);
}

let itemsPerPage = 5;
let currentPage = 1;

window.onload = function(){
    createLayout();    // Create all elements dynamically
    renderPage(currentPage);
}

function createLayout(){
    // Create container div
    let container = document.createElement("div");
    container.className = "container-box text-center";

    // Create title
    let title = document.createElement("h3");
    title.innerHTML = "DOM Pagination Example";
    container.appendChild(title);

    // Create list
    let list = document.createElement("ul");
    list.id = "dataList";
    list.className = "list-group mb-3";
    container.appendChild(list);

    // Create pagination div
    let pagination = document.createElement("div");
    pagination.id = "pagination";
    pagination.className = "d-flex justify-content-center flex-wrap";
    container.appendChild(pagination);

    // Append container to body
    document.body.appendChild(container);

    // Create pagination buttons
    createPaginationButtons();
}

function createPaginationButtons(){
    let totalPages = Math.ceil(data.length / itemsPerPage);
    let pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    // Previous button
    let prevBtn = document.createElement("button");
    prevBtn.className = "btn btn-secondary page-btn";
    prevBtn.innerHTML = "Previous";
    prevBtn.onclick = function(){
        if(currentPage > 1) renderPage(currentPage - 1);
    }
    pagination.appendChild(prevBtn);

    // Page number buttons
    for(let i=1;i<=totalPages;i++){
        let btn = document.createElement("button");
        btn.className = "btn btn-primary page-btn";
        btn.innerHTML = i;
        btn.onclick = function(){ renderPage(i); }
        pagination.appendChild(btn);
    }

    // Next button
    let nextBtn = document.createElement("button");
    nextBtn.className = "btn btn-secondary page-btn";
    nextBtn.innerHTML = "Next";
    nextBtn.onclick = function(){
        if(currentPage < totalPages) renderPage(currentPage + 1);
    }
    pagination.appendChild(nextBtn);
}

function renderPage(page){
    currentPage = page;
    let list = document.getElementById("dataList");
    list.innerHTML = "";

    let start = (page-1)*itemsPerPage;
    let end = start + itemsPerPage;
    let items = data.slice(start,end);

    items.forEach(function(item){
        let li = document.createElement("li");
        li.className = "list-group-item";
        li.innerHTML = item;
        list.appendChild(li);
    });
}
</script>

</head>
<body>
</body>
</html>
